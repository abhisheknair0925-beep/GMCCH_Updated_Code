name: patient_app
description: "Production Level POS System"
version: 2.0.0+12
publish_to: 'none'

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.3.0
  
  # State Management & DI
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  
  # Navigation
  go_router: ^17.3.0
  
  # API & Serialization
  dio: ^5.4.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.8.1
  
  # Database (Offline-first)
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # Security & Storage
  flutter_secure_storage: ^10.3.1
  jwt_decoder: ^2.0.1
  
  # UI & Responsive
  flutter_screenutil: ^5.9.0
  flex_color_scheme: ^8.4.0
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.9
  
  # Utils
  intl: ^0.20.2
  logger: ^2.0.2
  fluttertoast: ^9.1.0
  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.7.1
  drift_dev: ^2.14.1

flutter:
  uses-material-design: true
